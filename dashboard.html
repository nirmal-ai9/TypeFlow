<!DOCTYPE html>
<html>

<head>
  <title>TypeFlow - Free Online Typing Test</title>
  <meta name="description"
  content="Take a free typing test with TypeFlow. Measure typing speed, accuracy and improve keyboard skills.">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1><span id="type">Type</span><span id="flow">Flow</span></h1>
    <p id="heading">Practice typing online and improve your typing speed and accuracy.</p>
  </header>
  <main>
    <section id="paragraph">
      <form>
        <label class="input" for="txt-area" id="label"></label>
        <textarea class="input" id="txt-area" ></textarea>
      </form>
      <div class="inf" id="lpm-container">
        <p class="variable">Speed</p>
        <p class="digit"><span class="num" id="lpm">-</span> lpm</p>
      </div>
      <div class="inf"  id="accuracy-container">
        <p class="variable">Accuracy</p>
        <p class="digit"><span class="num" id="accuracy">-</span> %</p>
      </div>
      <div class="inf" id="time-container">
        <p class="variable">Time</p>
        <p class="digit"><span class="num" id="time">-</span> s</p>
      </div>
      <div title="Ctrl + r" id="refresh-container" class="inf">
        <button id="refresh" title="Ctrl + r">Refresh</button></div>
      <div id="progress-container">
        <div class="progress" id="bar-container">
          <div id="bar-border">
            <p id="bar"></p>
          </div>
        </div>
        <div class="progress" id="num-container">
          <p id="num"><span id="digit">-</span> %</p>
        </div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>

</html>
