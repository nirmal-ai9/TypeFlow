<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <title>TypeFlow</title>
</head>

<body>
  <header>
    <h1>Write the paragraph.</h1>
  </header>
  <main>
    <section id="paragraph" style="grid-area: box1;">
      <form>
        <label class="input" for="txt-area" id="label"></label>
        <textarea class="input" id="txt-area" cols="30" rows="10"></textarea>
      </form>
    </section>
    <section id="info" style="grid-area: box2;">
      <p class= "inf" id="lpm">Letters per minutes: 0 lpm</p>
      <p class="inf"  id="accuracy">Accuracy: 0%</p>
      <p class="inf" id="time">Time: 0 s</p>
      <button id="refresh">Refresh</button>
      <br>
    </section>
  </main>
  <script src="script.js"></script>
</body>

</html>
