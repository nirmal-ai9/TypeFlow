<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
  body{
    margin: 0;
    padding: 0;
    display: flex;
    height: 100dvh;
    justify-content: center;
    align-items: center;
    background-color: #121211;
  }
  #text{
    color: white;
    transition: 0.5s;
    font-size: 16px;
    height: 16px;
  }
  .t::after{
    content: "";
    display: inline-block;
    height: 10px;
    width: 10px;
    border-radius: 5px;
    animation: colorChange 1.35s infinite;
    margin-left: 5px;
  }
  @keyframes colorChange{
    0%{background: red}
    20%{background: blue}
    40%{background: yellow}
    60%{background: green}
    80%{background: orange}
    100%{background: #121212}
  }
  @media(min-width: 1024px){
    #text {
      font-size: 25px;
      height: 25px;
    }
    .t::after {
      height: 14px;
      width: 14px;
      border-radius: 7px;
      margin-left: 7px; 
    }
  }
  </style>
  <title>Nirmal</title>
</head>
<body>
  <h2 id = "text"></h2>
  <script>
  let line = "Wanna improve typing skill?"
  let txt = document.getElementById("text")
  let i = 0
  function wel() {
    if(i < line.length){
      txt.textContent += line[i]
      txt.classList.add("t")
      i++
      setTimeout(wel, 50)
    }else{
      txt.classList.remove("t")
      txt.style.transform = "scale(1.3)";
      setTimeout(() => {window.location.href = "dashboard.html"}, 700)
    }
  }
  wel()
  </script>
</body>
</html>
