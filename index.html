<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    body{
      padding: 0;
      margin: 0;
      min-height: 100vh;
      background: #00014F;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    img{
      margin: 0;
      padding: 0;
      width: 100%;
    }
    @media (orientation: landscape) {
      body{
        max-height: 100vh;
      }
      img{
        height: 100vh;
        width: auto;
      }
    }
  </style>
  <title>TypeFlow</title>
</head>
<body>
  <img src="typeflow_00014F.png" alt="Background">
  <script>
    const isLargeScreen = window.matchMedia("(min-width: 1024px)").matches;
    const img = document.querySelector("img")
    if (isLargeScreen) {
      img.src = "typeflow_wallpaper_4K.jpg"
    }
    setTimeout(() => {window.location.href = "dashboard.html"}, 2000)
  </script>
</body>
</html>
